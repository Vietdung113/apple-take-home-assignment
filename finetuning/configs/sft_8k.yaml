# SFT fine-tuning config — 8K context window (OPTIMIZED)

model: "unsloth/Qwen3-0.6B"
data_label: "8k"

# LoRA (OPTIMIZED)
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
use_rslora: true
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training (OPTIMIZED)
max_seq_length: 8192
per_device_train_batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
warmup_ratio: 0.05
lr_scheduler_type: "cosine"
weight_decay: 0.1
num_train_epochs: 10
bf16: true
max_grad_norm: 1.0
adam_beta2: 0.999
logging_steps: 50
save_steps: 500
eval_steps: 500
save_strategy: "steps"
eval_strategy: "steps"
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
save_total_limit: 3
seed: 42

# Data loading (NEW)
dataloader_num_workers: 4
dataloader_prefetch_factor: 2
dataloader_pin_memory: true

# Data
dataset: "ccdv/govreport-summarization"
data_dir: "data"

# Monitoring
use_wandb: true
wandb_project: "qwen3-govreport-sft"

# Output
output_dir: "output/sft_8k"
adapter_dir: "output/sft_8k/adapter"
gguf_dir: "output/sft_8k/gguf"
gguf_quant: "q4_k_m"
