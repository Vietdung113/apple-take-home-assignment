# SFT fine-tuning config — 32K context window

model: "unsloth/Qwen3-0.6B"
data_label: "32k"

# LoRA
lora_rank: 32
lora_alpha: 32
lora_dropout: 0
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
max_seq_length: 32768
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-4
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
weight_decay: 0.1
num_train_epochs: 1
bf16: true
logging_steps: 10
save_steps: 400
eval_steps: 400
seed: 42

# Data
dataset: "ccdv/govreport-summarization"
data_dir: "data"

# Monitoring
use_wandb: true
wandb_project: "qwen3-govreport-sft"

# Output
output_dir: "output/sft_32k"
adapter_dir: "output/sft_32k/adapter"
gguf_dir: "output/sft_32k/gguf"
gguf_quant: "q4_k_m"
