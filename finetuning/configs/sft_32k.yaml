# SFT fine-tuning config — 32K context window (OPTIMIZED)

model: "unsloth/Qwen3-0.6B-Instruct"
data_label: "32k"

# LoRA (OPTIMIZED)
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
use_rslora: true
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training (OPTIMIZED for 24GB GPU)
max_seq_length: 32768
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 2.0e-4
warmup_ratio: 0.05
lr_scheduler_type: "cosine"
weight_decay: 0.1
num_train_epochs: 1
bf16: true
max_grad_norm: 1.0
adam_beta2: 0.999
logging_steps: 10            # More frequent WandB logs
save_steps: 500
eval_steps: 500
save_strategy: "steps"
eval_strategy: "steps"
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
save_total_limit: 3
seed: 42

# Data loading (OPTIMIZED for 128-core CPU)
dataloader_num_workers: 32        # Increase from 4 to 32
dataloader_prefetch_factor: 4     # More prefetch with more workers
dataloader_pin_memory: true

# Data
dataset: "ccdv/govreport-summarization"
data_dir: "data"

# Monitoring
use_wandb: true
wandb_project: "qwen3-govreport-sft"

# Output
output_dir: "output/sft_32k"
adapter_dir: "output/sft_32k/adapter"
gguf_dir: "output/sft_32k/gguf"
gguf_quant: "q4_k_m"
